services:
    redis:
        image: redis:7
        environment:
            REDIS_PASSWORD: password
        ports:
            - "6375:6379"

    postgres:
        image: postgres:17
        environment:
            POSTGRES_USER: "user"
            POSTGRES_PASSWORD: "pass"
            POSTGRES_DB: "my_db"
        network_mode: host
        restart: always
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U user -d my_db" ]
            interval: 3s
            timeout: 3s
            retries: 10

volumes:
    postgres_data: